version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: threatdesk-postgres
    environment:
      POSTGRES_USER: threatdesk
      POSTGRES_PASSWORD: threatdesk
      POSTGRES_DB: threatdesk
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threatdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: threatdesk-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
